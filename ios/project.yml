name: MusicConverter
options:
  minimumXcodeGenVersion: 2.38.0
settings:
  base:
    SWIFT_VERSION: 5.9
targets:
  MusicConverterApp:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: App/Sources
    info:
      path: App/Resources/Info.plist
      properties:
        UILaunchScreen: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.musicconverter
        DEVELOPMENT_TEAM: SL7FG4PAZA
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - target: MusicConverterMessagesExtension
        embed: true
    scheme:
      testTargets:
        - MusicConverterTests

  MusicConverterMessagesExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: MessagesExtension/Sources
      - path: Shared/Sources
    info:
      path: MessagesExtension/Resources/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.musicconverter.messages
        INFOPLIST_KEY_CFBundleDisplayName: Music Converter
        DEVELOPMENT_TEAM: SL7FG4PAZA
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - sdk: Messages.framework
      - sdk: SwiftUI.framework

  MusicConverterTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Tests/Sources
      - path: Shared/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.musicconverter.tests
    dependencies:
      - target: MusicConverterMessagesExtension
