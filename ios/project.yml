name: MusicConverter
options:
  minimumXcodeGenVersion: 2.38.0
settings:
  base:
    SWIFT_VERSION: 5.9
targets:
  MusicConverterApp:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: App/Sources
      - path: App/Resources
        excludes:
          - Info.plist
    info:
      path: App/Resources/Info.plist
      properties:
        UILaunchScreen: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.musicconverter
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: SL7FG4PAZA
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - target: MusicConverterMessagesExtension
        embed: true
    scheme:
      testTargets:
        - MusicConverterTests

  MusicConverterMessagesExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: MessagesExtension/Sources
      - path: Shared/Sources
    info:
      path: MessagesExtension/Resources/Info.plist
      properties:
        CFBundleDisplayName: Music Converter
        BACKEND_BASE_URL: https://music-converter.meghrp27.workers.dev
        NSExtension:
          NSExtensionAttributes:
            MSMessagesExtensionStorefront: messages
          NSExtensionPointIdentifier: com.apple.message-payload-provider
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).MessagesViewController
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.musicconverter.messages
        DEVELOPMENT_TEAM: SL7FG4PAZA
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - sdk: Messages.framework
      - sdk: SwiftUI.framework

  MusicConverterTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Tests/Sources
      - path: Shared/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.musicconverter.tests
    dependencies:
      - target: MusicConverterMessagesExtension
